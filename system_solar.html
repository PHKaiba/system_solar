<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>Sistema Solar</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500&family=Cormorant+Garamond:wght@300;400&display=swap');
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }
        
        :root {
            --gold: #d4a96a;
            --blue: #a0c4ff;
            --red: #ff7a7a;
            --green: #80e6b0;
            --dim: rgba(255, 255, 255, .05);
            --glass: rgba(255, 255, 255, .06);
            --border: rgba(255, 255, 255, .10)
        }
        
        html,
        body {
            width: 100%;
            height: 100%;
            background: #000;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
            color: #fff;
            cursor: none
        }
        
        canvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0
        }
        
        #c3d {
            z-index: 1
        }
        
        #bloom-canvas {
            z-index: 2;
            pointer-events: none;
            mix-blend-mode: screen;
            opacity: .28
        }
        
        #cursor {
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            width: 20px;
            height: 20px;
            border: 1px solid rgba(255, 255, 255, .35);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: width .18s, height .18s, border-color .2s
        }
        
        #cursor-dot {
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            width: 3px;
            height: 3px;
            background: rgba(255, 255, 255, .6);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: background .2s
        }
        
        #cursor.hover {
            width: 30px;
            height: 30px;
            border-color: rgba(255, 220, 140, .6)
        }
        
        #cursor-dot.hover {
            background: rgba(255, 220, 140, .8)
        }
        
        #hud {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
            z-index: 100
        }
        
        #title-block {
            position: absolute;
            top: 28px;
            left: 36px;
            pointer-events: all
        }
        
        #title-block h1 {
            font-family: 'Cormorant Garamond', serif;
            font-weight: 300;
            font-size: clamp(1rem, 2vw, 1.5rem);
            letter-spacing: .2em;
            text-transform: uppercase;
            color: #fff;
            opacity: .75
        }
        
        #title-block p {
            font-family: 'Inter', sans-serif;
            font-size: .45rem;
            letter-spacing: .22em;
            color: rgba(255, 255, 255, .28);
            opacity: 1;
            margin-top: 6px;
            font-weight: 300
        }
        
        #time-display {
            position: absolute;
            top: 28px;
            right: 32px;
            text-align: right
        }
        
        #sim-date {
            font-family: 'Cormorant Garamond', serif;
            font-size: .8rem;
            letter-spacing: .15em;
            color: rgba(255, 255, 255, .32);
            font-weight: 300
        }
        
        #sim-label {
            font-size: .4rem;
            letter-spacing: .2em;
            color: rgba(255, 255, 255, .12);
            margin-top: 3px;
            font-weight: 300
        }
        
        #planet-panel {
            position: absolute;
            right: 32px;
            top: 50%;
            transform: translateY(-50%) translateX(18px);
            width: 230px;
            background: rgba(255, 255, 255, .05);
            border: 1px solid rgba(255, 255, 255, .09);
            backdrop-filter: blur(24px) saturate(1.2);
            padding: 22px 20px 18px;
            pointer-events: all;
            opacity: 0;
            transition: opacity .35s, transform .35s;
            border-radius: 12px
        }
        
        #planet-panel.visible {
            opacity: 1;
            transform: translateY(-50%) translateX(0)
        }
        
        #planet-panel h2 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.1rem;
            font-weight: 300;
            letter-spacing: .12em;
            color: rgba(255, 255, 255, .85);
            margin-bottom: 8px
        }
        
        #pp-desc {
            font-size: .48rem;
            line-height: 1.8;
            color: rgba(255, 255, 255, .3);
            margin-bottom: 14px;
            letter-spacing: .03em;
            font-weight: 300
        }
        
        .stat {
            display: flex;
            justify-content: space-between;
            font-size: .48rem;
            letter-spacing: .06em;
            color: rgba(255, 255, 255, .28);
            padding: 5px 0;
            border-bottom: 1px solid rgba(255, 255, 255, .05);
            font-weight: 300
        }
        
        .stat:last-child {
            border-bottom: none
        }
        
        .stat span:last-child {
            color: rgba(255, 255, 255, .55);
            font-size: .48rem
        }
        
        #pp-close {
            position: absolute;
            top: 12px;
            right: 14px;
            cursor: pointer;
            font-size: .44rem;
            letter-spacing: .12em;
            color: rgba(255, 255, 255, .18);
            pointer-events: all;
            transition: color .2s;
            font-weight: 300
        }
        
        #pp-close:hover {
            color: rgba(255, 120, 120, .7)
        }
        
        #pp-moons-list {
            margin-top: 8px;
            font-size: .44rem;
            color: rgba(255, 255, 255, .2);
            letter-spacing: .07em;
            line-height: 1.9;
            font-weight: 300
        }
        
        #planet-list {
            position: absolute;
            left: 32px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 3px;
            pointer-events: all
        }
        
        .pl-item {
            font-size: .44rem;
            font-weight: 300;
            letter-spacing: .2em;
            cursor: pointer;
            transition: color .2s, opacity .2s;
            padding: 4px 0;
            display: flex;
            align-items: center;
            gap: 8px;
            opacity: .5
        }
        
        .pl-item::before {
            content: '';
            width: 3px;
            height: 3px;
            border-radius: 50%;
            background: currentColor;
            opacity: .6;
            flex-shrink: 0
        }
        
        .pl-item:hover {
            opacity: 1
        }
        
        .pl-item.active {
            color: #fff!important;
            opacity: 1
        }
        
        #bottom-bar {
            position: absolute;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 5px;
            align-items: center;
            background: rgba(255, 255, 255, .04);
            border: 1px solid rgba(255, 255, 255, .07);
            backdrop-filter: blur(12px);
            padding: 7px 18px;
            border-radius: 100px;
            pointer-events: all;
            white-space: nowrap
        }
        
        #bottom-bar span {
            font-size: .42rem;
            font-weight: 300;
            letter-spacing: .14em;
            color: rgba(255, 255, 255, .2)
        }
        
        #bottom-bar .sep {
            color: rgba(255, 255, 255, .08)
        }
        
        #bottom-bar .key {
            background: rgba(255, 255, 255, .05);
            border: 1px solid rgba(255, 255, 255, .08);
            border-radius: 4px;
            padding: 2px 6px;
            font-size: .4rem;
            letter-spacing: .08em;
            color: rgba(255, 255, 255, .25);
            font-weight: 400
        }
        
        #speed-block {
            position: absolute;
            bottom: 24px;
            right: 32px;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 7px;
            pointer-events: all
        }
        
        #speed-block label {
            font-size: .42rem;
            font-weight: 300;
            letter-spacing: .2em;
            color: rgba(255, 255, 255, .18)
        }
        
        #speed-val {
            font-family: 'Cormorant Garamond', serif;
            font-size: .72rem;
            font-weight: 300;
            color: rgba(255, 255, 255, .5);
            min-width: 28px;
            text-align: right
        }
        
        #speed-slider {
            -webkit-appearance: none;
            width: 100px;
            height: 1px;
            background: rgba(255, 255, 255, .1);
            outline: none;
            border-radius: 2px;
            cursor: pointer
        }
        
        #speed-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: rgba(255, 255, 255, .6);
            box-shadow: 0 0 6px rgba(255, 255, 255, .2);
            cursor: pointer
        }
        
        #audio-btn {
            position: absolute;
            bottom: 24px;
            left: 32px;
            cursor: pointer;
            pointer-events: all;
            background: rgba(255, 255, 255, .04);
            border: 1px solid rgba(255, 255, 255, .07);
            backdrop-filter: blur(12px);
            padding: 7px 14px;
            border-radius: 100px;
            font-size: .42rem;
            font-weight: 300;
            letter-spacing: .16em;
            color: rgba(255, 255, 255, .22);
            transition: color .2s, border-color .2s;
            display: flex;
            align-items: center;
            gap: 8px
        }
        
        #audio-btn:hover {
            color: rgba(255, 255, 255, .55);
            border-color: rgba(255, 255, 255, .15)
        }
        
        #audio-btn.on {
            color: rgba(180, 240, 200, .8);
            border-color: rgba(180, 240, 200, .2)
        }
        
        #audio-icon {
            font-size: .7rem
        }
        
        #vignette {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 49;
            background: radial-gradient(ellipse at center, transparent 40%, rgba(0, 0, 0, .85) 100%)
        }
        
        #tooltip {
            position: fixed;
            pointer-events: none;
            z-index: 200;
            background: rgba(255, 255, 255, .06);
            border: 1px solid rgba(255, 255, 255, .1);
            backdrop-filter: blur(12px);
            padding: 5px 12px;
            font-size: .44rem;
            font-weight: 300;
            letter-spacing: .12em;
            color: rgba(255, 255, 255, .7);
            opacity: 0;
            transition: opacity .2s;
            white-space: nowrap;
            border-radius: 6px
        }
        
        @keyframes focusRing {
            0% {
                transform: translate(-50%, -50%) scale(1);
                opacity: .7
            }
            100% {
                transform: translate(-50%, -50%) scale(3);
                opacity: 0
            }
        }
        
        .focus-ring {
            position: fixed;
            width: 38px;
            height: 38px;
            border: 1px solid var(--gold);
            border-radius: 50%;
            pointer-events: none;
            z-index: 9998;
            animation: focusRing .6s ease-out forwards;
            margin-left: -19px;
            margin-top: -19px
        }
        
        #loading {
            position: fixed;
            inset: 0;
            z-index: 999;
            background: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 18px;
            transition: opacity 1.1s ease
        }
        
        #loading.fade {
            opacity: 0;
            pointer-events: none
        }
        
        #loading h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.2rem;
            font-weight: 300;
            letter-spacing: .5em;
            color: #fff;
            opacity: .4
        }
        
        #load-bar-wrap {
            width: 200px;
            height: 1px;
            background: rgba(255, 255, 255, .07)
        }
        
        #load-bar {
            height: 100%;
            width: 0%;
            background: var(--blue);
            box-shadow: 0 0 10px var(--blue);
            transition: width .06s linear
        }
        
        #load-pct {
            font-size: .52rem;
            letter-spacing: .32em;
            color: var(--blue);
            opacity: .42
        }
        
        #wind-canvas {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 3;
            mix-blend-mode: screen
        }
    </style>
</head>

<body>
    <div id="loading">
        <h1>SISTEMA SOLAR</h1>
        <div id="load-bar-wrap">
            <div id="load-bar"></div>
        </div>
        <span id="load-pct">0%</span>
    </div>
    <div id="cursor"></div>
    <div id="cursor-dot"></div>
    <canvas id="c3d"></canvas>
    <canvas id="bloom-canvas"></canvas>
    <canvas id="wind-canvas"></canvas>
    <div id="vignette"></div>
    <div id="tooltip"></div>
    <div id="hud">
        <div id="title-block">
            <h1>Sistema Solar</h1>
            <p>VISÃO HELIOCÊNTRICA · TEMPO SIMULADO</p>
        </div>
        <div id="time-display">
            <div id="sim-date">2025</div>
            <div id="sim-label">ANO SIMULADO</div>
        </div>
        <div id="planet-list"></div>
        <div id="planet-panel">
            <span id="pp-close">ESC ×</span>
            <h2 id="pp-name">—</h2>
            <p id="pp-desc"></p>
            <div class="stat"><span>DIÂMETRO</span><span id="pp-diam">—</span></div>
            <div class="stat"><span>DISTÂNCIA</span><span id="pp-dist">—</span></div>
            <div class="stat"><span>PERÍODO</span><span id="pp-period">—</span></div>
            <div class="stat"><span>LUAS</span><span id="pp-moons">—</span></div>
            <div class="stat"><span>TEMPERATURA</span><span id="pp-temp">—</span></div>
            <div class="stat"><span>GRAVIDADE</span><span id="pp-grav">—</span></div>
            <div id="pp-moons-list"></div>
        </div>
        <div id="bottom-bar">
            <span class="key">DRAG</span><span>GIRAR</span><span class="sep">·</span>
            <span class="key">SCROLL</span><span>ZOOM</span><span class="sep">·</span>
            <span class="key">CLICK</span><span>FOCAR</span><span class="sep">·</span>
            <span class="key">R</span><span>RESET</span>
        </div>
        <div id="speed-block">
            <label>VELOCIDADE</label>
            <div id="speed-row">
                <input type="range" id="speed-slider" min="0" max="6" step="0.1" value="0.3">
                <span id="speed-val">0.3×</span>
            </div>
        </div>
        <div id="audio-btn"><span id="audio-icon">♪</span><span id="audio-label">ÁUDIO OFF</span></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        'use strict';

        const c3d = document.getElementById('c3d');
        const renderer = new THREE.WebGLRenderer({
            canvas: c3d,
            antialias: true,
            alpha: false
        });
        renderer.setSize(innerWidth, innerHeight);
        renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(55, innerWidth / innerHeight, .05, 9000);
        camera.position.set(0, 130, 300);

        const bloomC = document.getElementById('bloom-canvas');
        bloomC.width = innerWidth;
        bloomC.height = innerHeight;
        const bloomCtx = bloomC.getContext('2d');

        const windC = document.getElementById('wind-canvas');
        windC.width = innerWidth;
        windC.height = innerHeight;
        const windCtx = windC.getContext('2d');

        // ── Camera orbit
        let dragging = false,
            rightDrag = false,
            pm = {
                x: 0,
                y: 0
            };
        let sph = {
                theta: .4,
                phi: 1.08,
                r: 330
            },
            tSph = {...sph
            };
        let pan = new THREE.Vector3(),
            tPan = new THREE.Vector3();
        let focusedPlanetObj = null;
        let camLerpFactor = 0.082,
            camLerpTarget = 0.082,
            camLerpDecay = 0;

        c3d.addEventListener('mousedown', e => {
            dragging = true;
            rightDrag = e.button === 2;
            pm = {
                x: e.clientX,
                y: e.clientY
            }
        });
        addEventListener('mouseup', () => dragging = false);
        addEventListener('mousemove', e => {
            if (!dragging) return;
            const dx = e.clientX - pm.x,
                dy = e.clientY - pm.y;
            if (!rightDrag) {
                tSph.theta -= dx * .005;
                tSph.phi = Math.max(.06, Math.min(Math.PI - .06, tSph.phi + dy * .005))
            } else {
                const r = new THREE.Vector3().crossVectors(camera.getWorldDirection(new THREE.Vector3()), camera.up).normalize();
                tPan.addScaledVector(r, -dx * .22);
                tPan.addScaledVector(camera.up, dy * .22)
            }
            pm = {
                x: e.clientX,
                y: e.clientY
            };
        });
        c3d.addEventListener('wheel', e => {
            tSph.r = Math.max(18, Math.min(1800, tSph.r + e.deltaY * .2))
        }, {
            passive: true
        });
        c3d.addEventListener('contextmenu', e => e.preventDefault());

        addEventListener('keydown', e => {
            if (e.key === 'r' || e.key === 'R') {
                tSph = {
                    theta: .4,
                    phi: 1.08,
                    r: 330
                };
                tPan.set(0, 0, 0);
                camLerpFactor = 0.018;
                camLerpDecay = 2.5;
                closePanel()
            }
            if (e.key === 'Escape') closePanel();
        });

        function camUpdate(dt) {
            if (camLerpDecay > 0) {
                camLerpDecay -= dt;
                if (camLerpDecay <= 0) {
                    camLerpDecay = 0;
                    camLerpFactor = 0.082
                }
            }
            const lf = camLerpFactor;
            sph.theta += (tSph.theta - sph.theta) * lf;
            sph.phi += (tSph.phi - sph.phi) * lf;
            sph.r += (tSph.r - sph.r) * lf;
            pan.lerp(tPan, lf);
            camera.position.set(sph.r * Math.sin(sph.phi) * Math.sin(sph.theta) + pan.x, sph.r * Math.cos(sph.phi) + pan.y, sph.r * Math.sin(sph.phi) * Math.cos(sph.theta) + pan.z);
            camera.lookAt(pan);
        }

        // ── Cursor
        const curEl = document.getElementById('cursor'),
            curDot = document.getElementById('cursor-dot');
        let cx = 0,
            cy = 0,
            ctx2 = 0,
            cty = 0;
        addEventListener('mousemove', e => {
            ctx2 = e.clientX;
            cty = e.clientY
        });
        (function tickCursor() {
            cx += (ctx2 - cx) * .18;
            cy += (cty - cy) * .18;
            curEl.style.left = cx + 'px';
            curEl.style.top = cy + 'px';
            curDot.style.left = ctx2 + 'px';
            curDot.style.top = cty + 'px';
            requestAnimationFrame(tickCursor)
        })();

        const ttEl = document.getElementById('tooltip');

        function showTT(t, x, y) {
            ttEl.textContent = t;
            ttEl.style.left = (x + 18) + 'px';
            ttEl.style.top = (y - 10) + 'px';
            ttEl.style.opacity = '1'
        }

        function hideTT() {
            ttEl.style.opacity = '0'
        }

        function spawnRing(x, y) {
            const el = document.createElement('div');
            el.className = 'focus-ring';
            el.style.left = x + 'px';
            el.style.top = y + 'px';
            document.body.appendChild(el);
            el.addEventListener('animationend', () => el.remove())
        }

        addEventListener('resize', () => {
            camera.aspect = innerWidth / innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(innerWidth, innerHeight);
            bloomC.width = innerWidth;
            bloomC.height = innerHeight;
            windC.width = innerWidth;
            windC.height = innerHeight;
        });

        // ── Audio
        let audioCtx = null,
            masterGain = null,
            audioOn = false;

        function initAudio() {
            if (audioCtx) return;
            audioCtx = new(window.AudioContext || window.webkitAudioContext)();
            masterGain = audioCtx.createGain();
            masterGain.gain.value = 0;
            masterGain.connect(audioCtx.destination);
            const revNode = audioCtx.createConvolver();
            const revLen = audioCtx.sampleRate * 3.5;
            const revBuf = audioCtx.createBuffer(2, revLen, audioCtx.sampleRate);
            for (let ch = 0; ch < 2; ch++) {
                const d = revBuf.getChannelData(ch);
                for (let i = 0; i < revLen; i++) d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / revLen, 2.2)
            }
            revNode.buffer = revBuf;
            const revGain = audioCtx.createGain();
            revGain.gain.value = .38;
            revNode.connect(revGain);
            revGain.connect(masterGain);
            window._revNode = revNode;

            function makeDrone(freq, type, vol, detune = 0) {
                const osc = audioCtx.createOscillator();
                const g = audioCtx.createGain();
                const fil = audioCtx.createBiquadFilter();
                osc.type = type;
                osc.frequency.value = freq;
                osc.detune.value = detune;
                fil.type = 'lowpass';
                fil.frequency.value = 800;
                fil.Q.value = 1.2;
                g.gain.value = vol;
                osc.connect(fil);
                fil.connect(g);
                g.connect(masterGain);
                g.connect(revNode);
                osc.start();
                return {
                    osc,
                    g
                }
            }
            makeDrone(27.5, 'sine', .18);
            makeDrone(41.2, 'sine', .12, 3);
            makeDrone(55, 'triangle', .08);
            makeDrone(110, 'sine', .045, -2);
            const lfo = audioCtx.createOscillator();
            const lfoG = audioCtx.createGain();
            lfoG.gain.value = 8;
            lfo.frequency.value = .04;
            lfo.type = 'sine';
            lfo.connect(lfoG);
            lfoG.connect(audioCtx.destination);
            lfo.start();
            const noiseLen = audioCtx.sampleRate * 2;
            const noiseBuf = audioCtx.createBuffer(1, noiseLen, audioCtx.sampleRate);
            const nd = noiseBuf.getChannelData(0);
            for (let i = 0; i < noiseLen; i++) nd[i] = (Math.random() * 2 - 1);
            const noiseSrc = audioCtx.createBufferSource();
            noiseSrc.buffer = noiseBuf;
            noiseSrc.loop = true;
            const noiseFilter = audioCtx.createBiquadFilter();
            noiseFilter.type = 'bandpass';
            noiseFilter.frequency.value = 120;
            noiseFilter.Q.value = .4;
            const noiseGain = audioCtx.createGain();
            noiseGain.gain.value = .022;
            noiseSrc.connect(noiseFilter);
            noiseFilter.connect(noiseGain);
            noiseGain.connect(masterGain);
            noiseSrc.start();
            window._noiseGain = noiseGain;
        }

        const PLANET_TONES = [196, 220, 261.6, 293.7, 349.2, 392, 440, 493.9, 523.25, 587.3];

        function playPing(freqHz) {
            if (!audioCtx || !audioOn) return;
            const osc = audioCtx.createOscillator();
            const env = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.value = freqHz;
            env.gain.setValueAtTime(0, audioCtx.currentTime);
            env.gain.linearRampToValueAtTime(.18, audioCtx.currentTime + .02);
            env.gain.exponentialRampToValueAtTime(.001, audioCtx.currentTime + 2.2);
            osc.connect(env);
            env.connect(masterGain);
            if (window._revNode) env.connect(window._revNode);
            osc.start();
            osc.stop(audioCtx.currentTime + 2.5)
        }

        function playWhoosh() {
            if (!audioCtx || !audioOn) return;
            const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * .5, audioCtx.sampleRate);
            const d = buf.getChannelData(0);
            for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / d.length, 1.5);
            const src = audioCtx.createBufferSource();
            src.buffer = buf;
            const fil = audioCtx.createBiquadFilter();
            fil.type = 'highpass';
            fil.frequency.value = 1200;
            const g = audioCtx.createGain();
            g.gain.value = .06;
            src.connect(fil);
            fil.connect(g);
            g.connect(masterGain);
            src.start()
        }

        document.getElementById('audio-btn').addEventListener('click', () => {
            initAudio();
            audioOn = !audioOn;
            const btn = document.getElementById('audio-btn'),
                lbl = document.getElementById('audio-label');
            if (audioOn) {
                masterGain.gain.setTargetAtTime(.7, audioCtx.currentTime, .8);
                btn.classList.add('on');
                lbl.textContent = 'ÁUDIO ON';
                playWhoosh()
            } else {
                masterGain.gain.setTargetAtTime(0, audioCtx.currentTime, .5);
                btn.classList.remove('on');
                lbl.textContent = 'ÁUDIO OFF'
            }
        });

        // ── Utilitários de textura melhorados
        function mkTex(fn, sz = 512) {
            const c = document.createElement('canvas');
            c.width = c.height = sz;
            fn(c.getContext('2d'), sz);
            return new THREE.CanvasTexture(c)
        }

        // Função de ruído Perlin simplificado para texturas mais orgânicas
        function fade(t) {
            return t * t * t * (t * (t * 6 - 15) + 10)
        }

        function lerp2(a, b, t) {
            return a + t * (b - a)
        }

        function grad(h, x, y) {
            const v = h & 3;
            const u = v < 2 ? x : y,
                w = v < 2 ? y : x;
            return ((h & 1) ? -u : u) + ((h & 2) ? -w : w)
        }
        const P = [];
        for (let i = 0; i < 512; i++) P[i] = Math.floor(Math.random() * 256);

        function noise2(x, y) {
            const xi = Math.floor(x) & 255,
                yi = Math.floor(y) & 255;
            const xf = x - Math.floor(x),
                yf = y - Math.floor(y);
            const u = fade(xf),
                v = fade(yf);
            const aa = P[P[xi] + yi],
                ab = P[P[xi] + yi + 1],
                ba = P[P[xi + 1] + yi],
                bb = P[P[xi + 1] + yi + 1];
            return lerp2(lerp2(grad(aa, xf, yf), grad(ba, xf - 1, yf), u), lerp2(grad(ab, xf, yf - 1), grad(bb, xf - 1, yf - 1), u), v)
        }

        function fbm(x, y, oct = 6, lac = 2.0, gain = 0.5) {
            let v = 0,
                amp = 0.5,
                freq = 1;
            for (let i = 0; i < oct; i++) {
                v += amp * noise2(x * freq, y * freq);
                amp *= gain;
                freq *= lac
            }
            return v
        }

                // Proeminências e flares nas bordas
                for (let i = 0; i < 8; i++) {

                        const dx = x / s - 0.5,

                        if (dist < 0.5) {
                            const n = fbm(x / 80, y / 80, 4) * 0.5 + 0.5;

                            idata.data[idx] = Math.min(255, idata.data[idx] + n * 25);

            windCtx.clearRect(0, 0, innerWidth, innerHeight);

            windParticles.forEach(p => {
                p.r += p.baseSpeed * windSpeed * .25;

                    p.r = 20 + Math.random() * 5;
                    p.angle = Math.random() * Math.PI * 2;
                    p.alpha = Math.random() * .7 + .3

                const wx = Math.cos(p.angle) * p.r,
                    wz = Math.sin(p.angle) * p.r;
                const vec = new THREE.Vector3(wx, 0, wz).project(camera);
                const sx = (vec.x * .5 + .5) * innerWidth,
                    sy = (1 - vec.y * .5 - .5) * innerHeight;
                if (vec.z > 1) return;
                const fade = 1 - p.r / 520;
                windCtx.beginPath();
                windCtx.arc(sx, sy, p.size * fade, 0, Math.PI * 2);
                windCtx.fillStyle = `rgba(255,${160+Math.random()*60|0},${60+Math.random()*40|0},${p.alpha*fade*.35})`;
                windCtx.fill();
            });
        }

                sy = (1 - sv.y * .5 - .5) * innerHeight;
            bloomCtx.clearRect(0, 0, innerWidth, innerHeight);
            const t2 = performance.now() * .001;
            for (let i = 3; i >= 0; i--) {
                const s = 90 + i * 55,
                    a = .025 - i * .005;
                const g = bloomCtx.createRadialGradient(sx, sy, 0, sx, sy, s + 12 * Math.sin(t2 * .4 + i));
                g.addColorStop(0, `rgba(255,220,100,${a})`);
                g.addColorStop(.3, `rgba(255,150,30,${a*.4})`);
                g.addColorStop(1, 'rgba(0,0,0,0)');
                bloomCtx.fillStyle = g;
                bloomCtx.fillRect(0, 0, innerWidth, innerHeight);
            }

            const dt = t - lastT;
            lastT = t;
            if (window._starMat) window._starMat.uniforms.time.value = t;
            sunMesh.rotation.y += .0006;
            sunLight.intensity = 2.8 + .3 * Math.sin(t * .65);
            sunGlow1.material.opacity = .55 + .08 * Math.sin(t * .8);
            sunGlow2.material.opacity = .14 + .06 * Math.sin(t * .5 + 1.1);
            sunCorona.material.rotation = t * .015;
            sunCorona.material.opacity = .18 + .06 * Math.sin(t * .3);
            planets.forEach(p => {
                p.angle += p.spd * speedMult;
                p.pivot.rotation.y = p.angle;
                p.mesh.rotation.y += .0018 * speedMult;
                if (p.mesh.userData.aurMat) p.mesh.userData.aurMat.uniforms.time.value = t;
                p.moons.forEach(m => {
                    m.angle += m.speed * speedMult;
                    m.moonPivot.rotation.y = m.angle
                });
                if (focusedPlanetObj === p) {
                    const wp = new THREE.Vector3();
                    p.mesh.getWorldPosition(wp);
                    tPan.copy(wp)
                }
            });
            comets.forEach(c => {
                c.angle += c.speed * speedMult;
                c.pivot.rotation.y = c.angle;
                c.tail.material.opacity = Math.max(0, .7 - c.orbitR / 550);
                if (c.glow) c.glow.material.opacity = Math.max(0, .9 - c.orbitR / 400)
            });
            updateDate(dt);
            camUpdate(dt);
            renderer.render(scene, camera);
            drawBloom();
            updateWind();
        }
        animate();
    </script>
</body>

</html>
