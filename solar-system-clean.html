<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>Sistema Solar</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500&family=Cormorant+Garamond:wght@300;400&display=swap');
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }
        
         :root {
            --gold: #d4a96a;
            --blue: #a0c4ff;
            --red: #ff7a7a;
            --green: #80e6b0;
            --dim: rgba(255, 255, 255, .05);
            --glass: rgba(255, 255, 255, .06);
            --border: rgba(255, 255, 255, .10);
        }
        
        html,
        body {
            width: 100%;
            height: 100%;
            background: #000;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
            color: #fff;
            cursor: none
        }
        
        canvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0
        }
        
        #c3d {
            z-index: 1
        }
        
        #bloom-canvas {
            z-index: 2;
            pointer-events: none;
            mix-blend-mode: screen;
            opacity: .7
        }
        /* cursor */
        
        #cursor {
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            width: 20px;
            height: 20px;
            border: 1px solid rgba(255, 255, 255, .35);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: width .18s, height .18s, border-color .2s
        }
        
        #cursor-dot {
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            width: 3px;
            height: 3px;
            background: rgba(255, 255, 255, .6);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: background .2s
        }
        
        #cursor.hover {
            width: 30px;
            height: 30px;
            border-color: rgba(255, 220, 140, .6)
        }
        
        #cursor-dot.hover {
            background: rgba(255, 220, 140, .8)
        }
        /* HUD */
        
        #hud {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
            z-index: 100
        }
        
        #title-block {
            position: absolute;
            top: 28px;
            left: 36px;
            pointer-events: all
        }
        
        #title-block h1 {
            font-family: 'Cormorant Garamond', serif;
            font-weight: 300;
            font-size: clamp(1rem, 2vw, 1.5rem);
            letter-spacing: .2em;
            text-transform: uppercase;
            color: #fff;
            opacity: .75
        }
        
        #title-block p {
            font-family: 'Inter', sans-serif;
            font-size: .45rem;
            letter-spacing: .22em;
            color: rgba(255, 255, 255, .28);
            opacity: 1;
            margin-top: 6px;
            font-weight: 300
        }
        
        .corner {
            display: none
        }
        
        .tl {
            top: 12px;
            left: 12px
        }
        
        .tr {
            top: 12px;
            right: 12px;
            transform: scaleX(-1)
        }
        
        .bl {
            bottom: 12px;
            left: 12px;
            transform: scaleY(-1)
        }
        
        .br {
            bottom: 12px;
            right: 12px;
            transform: scale(-1)
        }
        /* time */
        
        #time-display {
            position: absolute;
            top: 28px;
            right: 32px;
            text-align: right
        }
        
        #sim-date {
            font-family: 'Cormorant Garamond', serif;
            font-size: .8rem;
            letter-spacing: .15em;
            color: rgba(255, 255, 255, .32);
            font-weight: 300
        }
        
        #sim-label {
            font-size: .4rem;
            letter-spacing: .2em;
            color: rgba(255, 255, 255, .12);
            margin-top: 3px;
            font-weight: 300
        }
        /* panel */
        
        #planet-panel {
            position: absolute;
            right: 32px;
            top: 50%;
            transform: translateY(-50%) translateX(18px);
            width: 230px;
            background: rgba(255, 255, 255, .05);
            border: 1px solid rgba(255, 255, 255, .09);
            backdrop-filter: blur(24px) saturate(1.2);
            padding: 22px 20px 18px;
            pointer-events: all;
            opacity: 0;
            transition: opacity .35s, transform .35s;
            border-radius: 12px
        }
        
        #planet-panel.visible {
            opacity: 1;
            transform: translateY(-50%) translateX(0)
        }
        
        #planet-panel h2 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.1rem;
            font-weight: 300;
            letter-spacing: .12em;
            color: rgba(255, 255, 255, .85);
            margin-bottom: 8px
        }
        
        #pp-desc {
            font-size: .48rem;
            line-height: 1.8;
            color: rgba(255, 255, 255, .3);
            margin-bottom: 14px;
            letter-spacing: .03em;
            font-weight: 300
        }
        
        .stat {
            display: flex;
            justify-content: space-between;
            font-size: .48rem;
            letter-spacing: .06em;
            color: rgba(255, 255, 255, .28);
            padding: 5px 0;
            border-bottom: 1px solid rgba(255, 255, 255, .05);
            font-weight: 300
        }
        
        .stat:last-child {
            border-bottom: none
        }
        
        .stat span:last-child {
            color: rgba(255, 255, 255, .55);
            font-size: .48rem
        }
        
        #pp-close {
            position: absolute;
            top: 12px;
            right: 14px;
            cursor: pointer;
            font-size: .44rem;
            letter-spacing: .12em;
            color: rgba(255, 255, 255, .18);
            pointer-events: all;
            transition: color .2s;
            font-weight: 300
        }
        
        #pp-close:hover {
            color: rgba(255, 120, 120, .7)
        }
        
        #pp-moons-list {
            margin-top: 8px;
            font-size: .44rem;
            color: rgba(255, 255, 255, .2);
            letter-spacing: .07em;
            line-height: 1.9;
            font-weight: 300
        }
        /* planet list */
        
        #planet-list {
            position: absolute;
            left: 32px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 3px;
            pointer-events: all
        }
        
        .pl-item {
            font-size: .44rem;
            font-weight: 300;
            letter-spacing: .2em;
            cursor: pointer;
            transition: color .2s, opacity .2s;
            padding: 4px 0;
            display: flex;
            align-items: center;
            gap: 8px;
            opacity: .5
        }
        
        .pl-item::before {
            content: '';
            width: 3px;
            height: 3px;
            border-radius: 50%;
            background: currentColor;
            opacity: .6;
            flex-shrink: 0
        }
        
        .pl-item:hover {
            opacity: 1
        }
        
        .pl-item.active {
            color: #fff !important;
            opacity: 1
        }
        /* bottom bar */
        
        #bottom-bar {
            position: absolute;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 5px;
            align-items: center;
            background: rgba(255, 255, 255, .04);
            border: 1px solid rgba(255, 255, 255, .07);
            backdrop-filter: blur(12px);
            padding: 7px 18px;
            border-radius: 100px;
            pointer-events: all;
            white-space: nowrap
        }
        
        #bottom-bar span {
            font-size: .42rem;
            font-weight: 300;
            letter-spacing: .14em;
            color: rgba(255, 255, 255, .2)
        }
        
        #bottom-bar .sep {
            color: rgba(255, 255, 255, .08)
        }
        
        #bottom-bar .key {
            background: rgba(255, 255, 255, .05);
            border: 1px solid rgba(255, 255, 255, .08);
            border-radius: 4px;
            padding: 2px 6px;
            font-size: .4rem;
            letter-spacing: .08em;
            color: rgba(255, 255, 255, .25);
            font-weight: 400
        }
        /* speed */
        
        #speed-block {
            position: absolute;
            bottom: 24px;
            right: 32px;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 7px;
            pointer-events: all
        }
        
        #speed-block label {
            font-size: .42rem;
            font-weight: 300;
            letter-spacing: .2em;
            color: rgba(255, 255, 255, .18)
        }
        
        #speed-val {
            font-family: 'Cormorant Garamond', serif;
            font-size: .72rem;
            font-weight: 300;
            color: rgba(255, 255, 255, .5);
            min-width: 28px;
            text-align: right
        }
        
        #speed-slider {
            -webkit-appearance: none;
            width: 100px;
            height: 1px;
            background: rgba(255, 255, 255, .1);
            outline: none;
            border-radius: 2px;
            cursor: pointer
        }
        
        #speed-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: rgba(255, 255, 255, .6);
            box-shadow: 0 0 6px rgba(255, 255, 255, .2);
            cursor: pointer
        }
        
        #audio-btn {
            position: absolute;
            bottom: 24px;
            left: 32px;
            cursor: pointer;
            pointer-events: all;
            background: rgba(255, 255, 255, .04);
            border: 1px solid rgba(255, 255, 255, .07);
            backdrop-filter: blur(12px);
            padding: 7px 14px;
            border-radius: 100px;
            font-size: .42rem;
            font-weight: 300;
            letter-spacing: .16em;
            color: rgba(255, 255, 255, .22);
            transition: color .2s, border-color .2s;
            display: flex;
            align-items: center;
            gap: 8px
        }
        
        #audio-btn:hover {
            color: rgba(255, 255, 255, .55);
            border-color: rgba(255, 255, 255, .15)
        }
        
        #audio-btn.on {
            color: rgba(180, 240, 200, .8);
            border-color: rgba(180, 240, 200, .2)
        }
        
        #audio-icon {
            font-size: .7rem
        }
        /* overlays */
        
        #scanlines {
            display: none
        }
        
        #vignette {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 49;
            background: radial-gradient(ellipse at center, transparent 40%, rgba(0, 0, 0, .85) 100%)
        }
        /* tooltip */
        
        #tooltip {
            position: fixed;
            pointer-events: none;
            z-index: 200;
            background: rgba(255, 255, 255, .06);
            border: 1px solid rgba(255, 255, 255, .1);
            backdrop-filter: blur(12px);
            padding: 5px 12px;
            font-size: .44rem;
            font-weight: 300;
            letter-spacing: .12em;
            color: rgba(255, 255, 255, .7);
            opacity: 0;
            transition: opacity .2s;
            white-space: nowrap;
            border-radius: 6px
        }
        /* focus ring */
        
        @keyframes focusRing {
            0% {
                transform: translate(-50%, -50%) scale(1);
                opacity: .7
            }
            100% {
                transform: translate(-50%, -50%) scale(3);
                opacity: 0
            }
        }
        
        .focus-ring {
            position: fixed;
            width: 38px;
            height: 38px;
            border: 1px solid var(--gold);
            border-radius: 50%;
            pointer-events: none;
            z-index: 9998;
            animation: focusRing .6s ease-out forwards;
            margin-left: -19px;
            margin-top: -19px
        }
        /* loading */
        
        #loading {
            position: fixed;
            inset: 0;
            z-index: 999;
            background: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 18px;
            transition: opacity 1.1s ease
        }
        
        #loading.fade {
            opacity: 0;
            pointer-events: none
        }
        
        #loading h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.2rem;
            font-weight: 300;
            letter-spacing: .5em;
            color: #fff;
            opacity: .4
        }
        
        #load-bar-wrap {
            width: 200px;
            height: 1px;
            background: rgba(255, 255, 255, .07)
        }
        
        #load-bar {
            height: 100%;
            width: 0%;
            background: var(--blue);
            box-shadow: 0 0 10px var(--blue);
            transition: width .06s linear
        }
        
        #load-pct {
            font-size: .52rem;
            letter-spacing: .32em;
            color: var(--blue);
            opacity: .42
        }
        /* wind particles canvas */
        
        #wind-canvas {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 3;
            mix-blend-mode: screen
        }
        /* distance line */
        
        #dist-overlay {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 101
        }
        
        #dist-label {
            position: fixed;
            pointer-events: none;
            z-index: 102;
            font-family: 'Orbitron', sans-serif;
            font-size: .52rem;
            letter-spacing: .14em;
            color: var(--green);
            background: var(--glass);
            border: 1px solid rgba(68, 255, 153, .2);
            padding: 4px 10px;
            border-radius: 4px;
            display: none
        }
        /* aurora overlay on earth */
        
        @keyframes auroraShift {
            0%,
            100% {
                opacity: .35
            }
            50% {
                opacity: .6
            }
        }
    </style>
</head>

<body>

    <div id="loading">
        <h1>SISTEMA SOLAR</h1>
        <div id="load-bar-wrap">
            <div id="load-bar"></div>
        </div><span id="load-pct">0%</span></div>

    <div id="cursor"></div>
    <div id="cursor-dot"></div>
    <canvas id="c3d"></canvas>
    <canvas id="bloom-canvas"></canvas>
    <canvas id="wind-canvas"></canvas>
    <div id="scanlines"></div>
    <div id="vignette"></div>
    <div id="tooltip"></div>
    <svg id="dist-overlay"></svg>
    <div id="dist-label"></div>

    <div id="hud">
        <div class="corner tl"></div>
        <div class="corner tr"></div>
        <div class="corner bl"></div>
        <div class="corner br"></div>
        <div id="title-block">
            <h1>Sistema Solar</h1>
            <p>VISÃO HELIOCÊNTRICA · TEMPO SIMULADO</p>
        </div>
        <div id="time-display">
            <div id="sim-date">2025</div>
            <div id="sim-label">ANO SIMULADO</div>
        </div>
        <div id="planet-list"></div>
        <div id="planet-panel">
            <span id="pp-close">ESC ×</span>
            <h2 id="pp-name">—</h2>
            <p id="pp-desc"></p>
            <div class="stat"><span>DIÂMETRO</span><span id="pp-diam">—</span></div>
            <div class="stat"><span>DISTÂNCIA</span><span id="pp-dist">—</span></div>
            <div class="stat"><span>PERÍODO</span><span id="pp-period">—</span></div>
            <div class="stat"><span>LUAS</span><span id="pp-moons">—</span></div>
            <div class="stat"><span>TEMPERATURA</span><span id="pp-temp">—</span></div>
            <div class="stat"><span>GRAVIDADE</span><span id="pp-grav">—</span></div>
            <div id="pp-moons-list"></div>
        </div>
        <div id="bottom-bar">
            <span class="key">DRAG</span><span>GIRAR</span><span class="sep">·</span>
            <span class="key">SCROLL</span><span>ZOOM</span><span class="sep">·</span>
            <span class="key">CLICK</span><span>FOCAR</span><span class="sep">·</span>
            <span class="key">R</span><span>RESET</span>
        </div>
        <div id="speed-block">
            <label>VELOCIDADE</label>
            <div id="speed-row">
                <input type="range" id="speed-slider" min="0" max="6" step="0.1" value="0.3">
                <span id="speed-val">0.3×</span>
            </div>
        </div>
        <div id="audio-btn"><span id="audio-icon">♪</span><span id="audio-label">ÁUDIO OFF</span></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        'use strict';
        // ═══════════════════════════════════════════════════════
        //  SISTEMA SOLAR IMERSIVO v3
        //  + Audio Web API   + Bloom canvas   + Vento solar
        //  + Luas nomeadas   + Cometa Halley  + Plutão
        //  + Auroras Terra   + Atmosfera real
        // ═══════════════════════════════════════════════════════

        // ── Renderer ────────────────────────────────────────────
        const c3d = document.getElementById('c3d');
        const renderer = new THREE.WebGLRenderer({
            canvas: c3d,
            antialias: true,
            alpha: false
        });
        renderer.setSize(innerWidth, innerHeight);
        renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(55, innerWidth / innerHeight, 0.05, 9000);
        camera.position.set(0, 130, 300);

        // ── Bloom canvas (simple additive glow pass) ────────────
        const bloomC = document.getElementById('bloom-canvas');
        bloomC.width = innerWidth;
        bloomC.height = innerHeight;
        const bloomCtx = bloomC.getContext('2d');

        // ── Wind canvas (solar wind particles) ──────────────────
        const windC = document.getElementById('wind-canvas');
        windC.width = innerWidth;
        windC.height = innerHeight;
        const windCtx = windC.getContext('2d');

        // ── Camera orbit ────────────────────────────────────────
        let dragging = false,
            rightDrag = false,
            pm = {
                x: 0,
                y: 0
            };
        let sph = {
                theta: .4,
                phi: 1.08,
                r: 330
            },
            tSph = {...sph
            };
        let pan = new THREE.Vector3(),
            tPan = new THREE.Vector3();
        let focusedPlanetObj = null;

        c3d.addEventListener('mousedown', e => {
            dragging = true;
            rightDrag = e.button === 2;
            pm = {
                x: e.clientX,
                y: e.clientY
            }
        });
        addEventListener('mouseup', () => dragging = false);
        addEventListener('mousemove', e => {
            if (!dragging) return;
            const dx = e.clientX - pm.x,
                dy = e.clientY - pm.y;
            if (!rightDrag) {
                tSph.theta -= dx * .005;
                tSph.phi = Math.max(.06, Math.min(Math.PI - .06, tSph.phi + dy * .005))
            } else {
                const r = new THREE.Vector3().crossVectors(camera.getWorldDirection(new THREE.Vector3()), camera.up).normalize();
                tPan.addScaledVector(r, -dx * .22);
                tPan.addScaledVector(camera.up, dy * .22)
            }
            pm = {
                x: e.clientX,
                y: e.clientY
            };
        });
        c3d.addEventListener('wheel', e => {
            tSph.r = Math.max(18, Math.min(1800, tSph.r + e.deltaY * .2))
        }, {
            passive: true
        });
        c3d.addEventListener('contextmenu', e => e.preventDefault());
        addEventListener('keydown', e => {
            if (e.key === 'r' || e.key === 'R') {
                tSph = {
                    theta: .4,
                    phi: 1.08,
                    r: 330
                };
                tPan.set(0, 0, 0);
                closePanel()
            }
            if (e.key === 'Escape') closePanel()
        });

        function camUpdate() {
            sph.theta += (tSph.theta - sph.theta) * .082;
            sph.phi += (tSph.phi - sph.phi) * .082;
            sph.r += (tSph.r - sph.r) * .082;
            pan.lerp(tPan, .082);
            camera.position.set(sph.r * Math.sin(sph.phi) * Math.sin(sph.theta) + pan.x, sph.r * Math.cos(sph.phi) + pan.y, sph.r * Math.sin(sph.phi) * Math.cos(sph.theta) + pan.z);
            camera.lookAt(pan);
        }

        // ── Cursor ───────────────────────────────────────────────
        const curEl = document.getElementById('cursor'),
            curDot = document.getElementById('cursor-dot');
        let cx = 0,
            cy = 0,
            ctx2 = 0,
            cty = 0;
        addEventListener('mousemove', e => {
            ctx2 = e.clientX;
            cty = e.clientY
        });
        (function tickCursor() {
            cx += (ctx2 - cx) * .18;
            cy += (cty - cy) * .18;
            curEl.style.left = cx + 'px';
            curEl.style.top = cy + 'px';
            curDot.style.left = ctx2 + 'px';
            curDot.style.top = cty + 'px';
            requestAnimationFrame(tickCursor)
        })();

        // ── Tooltip ──────────────────────────────────────────────
        const ttEl = document.getElementById('tooltip');

        function showTT(t, x, y) {
            ttEl.textContent = t;
            ttEl.style.left = (x + 18) + 'px';
            ttEl.style.top = (y - 10) + 'px';
            ttEl.style.opacity = '1'
        }

        function hideTT() {
            ttEl.style.opacity = '0'
        }

        // ── Focus ring ───────────────────────────────────────────
        function spawnRing(x, y) {
            const el = document.createElement('div');
            el.className = 'focus-ring';
            el.style.left = x + 'px';
            el.style.top = y + 'px';
            document.body.appendChild(el);
            el.addEventListener('animationend', () => el.remove())
        }

        // ── Resize ───────────────────────────────────────────────
        addEventListener('resize', () => {
            camera.aspect = innerWidth / innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(innerWidth, innerHeight);
            bloomC.width = innerWidth;
            bloomC.height = innerHeight;
            windC.width = innerWidth;
            windC.height = innerHeight;
        });

        // ══════════════════════════════════════════════════════════
        //  WEB AUDIO ENGINE
        // ══════════════════════════════════════════════════════════
        let audioCtx = null,
            masterGain = null,
            audioOn = false;
        const oscillators = [],
            reverbNode = null;

        function initAudio() {
            if (audioCtx) return;
            audioCtx = new(window.AudioContext || window.webkitAudioContext)();
            masterGain = audioCtx.createGain();
            masterGain.gain.value = 0;
            masterGain.connect(audioCtx.destination);

            // Convolution reverb (impulse response generated)
            const revNode = audioCtx.createConvolver();
            const revLen = audioCtx.sampleRate * 3.5;
            const revBuf = audioCtx.createBuffer(2, revLen, audioCtx.sampleRate);
            for (let ch = 0; ch < 2; ch++) {
                const d = revBuf.getChannelData(ch);
                for (let i = 0; i < revLen; i++) d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / revLen, 2.2)
            }
            revNode.buffer = revBuf;
            const revGain = audioCtx.createGain();
            revGain.gain.value = 0.38;
            revNode.connect(revGain);
            revGain.connect(masterGain);
            window._revNode = revNode;

            // Deep space drone (sub bass pad)
            function makeDrone(freq, type, vol, detune = 0) {
                const osc = audioCtx.createOscillator();
                const g = audioCtx.createGain();
                const fil = audioCtx.createBiquadFilter();
                osc.type = type;
                osc.frequency.value = freq;
                osc.detune.value = detune;
                fil.type = 'lowpass';
                fil.frequency.value = 800;
                fil.Q.value = 1.2;
                g.gain.value = vol;
                osc.connect(fil);
                fil.connect(g);
                g.connect(masterGain);
                g.connect(revNode);
                osc.start();
                return {
                    osc,
                    g
                };
            }
            makeDrone(27.5, 'sine', .18); // sub bass A0
            makeDrone(41.2, 'sine', .12, 3); // E1 slight detune
            makeDrone(55, 'triangle', .08); // A1 shimmer
            makeDrone(110, 'sine', .045, -2); // A2 presence

            // Slow LFO modulates the A1
            const lfo = audioCtx.createOscillator();
            const lfoG = audioCtx.createGain();
            lfoG.gain.value = 8;
            lfo.frequency.value = 0.04;
            lfo.type = 'sine';
            lfo.connect(lfoG);
            lfoG.connect(oscillators[2] ? oscillators[2].osc.frequency : audioCtx.destination);
            lfo.start();

            // Cosmic texture: filtered noise
            const noiseLen = audioCtx.sampleRate * 2;
            const noiseBuf = audioCtx.createBuffer(1, noiseLen, audioCtx.sampleRate);
            const nd = noiseBuf.getChannelData(0);
            for (let i = 0; i < noiseLen; i++) nd[i] = (Math.random() * 2 - 1);
            const noiseSrc = audioCtx.createBufferSource();
            noiseSrc.buffer = noiseBuf;
            noiseSrc.loop = true;
            const noiseFilter = audioCtx.createBiquadFilter();
            noiseFilter.type = 'bandpass';
            noiseFilter.frequency.value = 120;
            noiseFilter.Q.value = 0.4;
            const noiseGain = audioCtx.createGain();
            noiseGain.gain.value = 0.022;
            noiseSrc.connect(noiseFilter);
            noiseFilter.connect(noiseGain);
            noiseGain.connect(masterGain);
            noiseSrc.start();
            window._noiseGain = noiseGain;
        }

        function playPing(freqHz) {
            if (!audioCtx || !audioOn) return;
            const osc = audioCtx.createOscillator();
            const env = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.value = freqHz;
            env.gain.setValueAtTime(0, audioCtx.currentTime);
            env.gain.linearRampToValueAtTime(.18, audioCtx.currentTime + .02);
            env.gain.exponentialRampToValueAtTime(.001, audioCtx.currentTime + 2.2);
            osc.connect(env);
            env.connect(masterGain);
            if (window._revNode) env.connect(window._revNode);
            osc.start();
            osc.stop(audioCtx.currentTime + 2.5);
        }

        function playWhoosh() {
            if (!audioCtx || !audioOn) return;
            const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * .5, audioCtx.sampleRate);
            const d = buf.getChannelData(0);
            for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / d.length, 1.5);
            const src = audioCtx.createBufferSource();
            src.buffer = buf;
            const fil = audioCtx.createBiquadFilter();
            fil.type = 'highpass';
            fil.frequency.value = 1200;
            const g = audioCtx.createGain();
            g.gain.value = 0.06;
            src.connect(fil);
            fil.connect(g);
            g.connect(masterGain);
            src.start();
        }

                ctx.fillStyle = `rgba(${r+o|0},${g+o|0},${b+o|0},${alpha})`;

                    ph = Math.acos(2 * Math.random() - 1);

                pos[i * 3 + 1] = r * Math.sin(ph) * Math.sin(th);
                pos[i * 3 + 2] = r * Math.cos(ph);
                const c = cols[Math.floor(Math.random() * cols.length)];
                col[i * 3] = c[0];
                col[i * 3 + 1] = c[1];
                col[i * 3 + 2] = c[2];
                sz[i] = Math.random() < .012 ? Math.random() * 3 + 2 : Math.random() * .9 + .2;
            }

            ctx.fillRect(0, 0, sz, sz);
            return new THREE.CanvasTexture(c);

            halleyTail.position.set(220, 0, 0);
            halleyGlow.position.set(220, 0, 0);
            comets.push({
                head: halleyHead,
                tail: halleyTail,
                glow: halleyGlow,
                pivot: hPivot,
                orbitR: 220,
                speed: .0018,
                angle: 0,
                incl: .55,
                halley: true
            });
        })();

        // ── Solar wind particles ─────────────────────────────────
        const windParticles = [];
        (() => {
            for (let i = 0; i < 180; i++) {
                windParticles.push({
                    angle: Math.random() * Math.PI * 2,
                    r: 20 + Math.random() * 5,
                    speed: 1.8 + Math.random() * 2.2,
                    size: Math.random() * 2 + .5,
                    alpha: Math.random() * .7 + .3,
                    dead: false
                });
            }
        })();

        function updateWind(t) {
            windCtx.clearRect(0, 0, innerWidth, innerHeight);
            windParticles.forEach(p => {
                p.r += p.speed * .25;
                if (p.r > 500) {
                    p.r = 20 + Math.random() * 5;
                    p.angle = Math.random() * Math.PI * 2;
                    p.alpha = Math.random() * .7 + .3
                }
                // Project to screen
                const wx = Math.cos(p.angle) * p.r,
                    wz = Math.sin(p.angle) * p.r;
                const vec = new THREE.Vector3(wx, 0, wz).project(camera);
                const sx = (vec.x * .5 + .5) * innerWidth,
                    sy = (1 - vec.y * .5 - .5) * innerHeight;
                if (vec.z > 1) return;
                const fade = 1 - p.r / 500;
                windCtx.beginPath();
                windCtx.arc(sx, sy, p.size * fade, 0, Math.PI * 2);
                windCtx.fillStyle = `rgba(255,${160+Math.random()*60|0},${60+Math.random()*40|0},${p.alpha*fade*.35})`;
                windCtx.fill();
            });
        }

        // ── Bloom pass (canvas-based) ─────────────────────────────
        function drawBloom() {
            // Get sun screen position
            const sv = new THREE.Vector3(0, 0, 0).project(camera);
            const sx = (sv.x * .5 + .5) * innerWidth,
                sy = (1 - sv.y * .5 - .5) * innerHeight;
            bloomCtx.clearRect(0, 0, innerWidth, innerHeight);
            // Radial bloom from sun
            const t2 = performance.now() * .001;
            for (let i = 3; i >= 0; i--) {
                const s = 160 + i * 90,
                    a = .06 - i * .012;
                const g = bloomCtx.createRadialGradient(sx, sy, 0, sx, sy, s + 20 * Math.sin(t2 * .4 + i));
                g.addColorStop(0, `rgba(255,220,100,${a})`);
                g.addColorStop(.3, `rgba(255,150,30,${a*.5})`);
                g.addColorStop(1, 'rgba(0,0,0,0)');
                bloomCtx.fillStyle = g;
                bloomCtx.fillRect(0, 0, innerWidth, innerHeight);
            }
        }

        // ── Raycaster ────────────────────────────────────────────
        const ray = new THREE.Raycaster(),
            m2d = new THREE.Vector2();
        const panel = document.getElementById('planet-panel');

        function showPanel(pd, moons) {
            document.getElementById('pp-name').textContent = pd.name.toUpperCase();
            document.getElementById('pp-desc').textContent = pd.desc || '';
            document.getElementById('pp-diam').textContent = pd.info.diam;
            document.getElementById('pp-dist').textContent = pd.info.dist;
            document.getElementById('pp-period').textContent = pd.info.period;
            document.getElementById('pp-moons').textContent = pd.info.moons;
            document.getElementById('pp-temp').textContent = pd.info.temp || '—';
            document.getElementById('pp-grav').textContent = pd.info.grav || '—';
            const ml = document.getElementById('pp-moons-list');
            ml.innerHTML = '';
            if (moons && moons.length) {
                ml.innerHTML = '<div style="color:rgba(255,255,255,.2);font-size:.44rem;letter-spacing:.14em;margin-top:8px;margin-bottom:4px">LUAS PRINCIPAIS</div>';
                moons.forEach(m => {
                    const d = document.createElement('div');
                    d.textContent = '· ' + m.name;
                    ml.appendChild(d)
                });
            }
            panel.classList.add('visible');
        }

        function closePanel() {
            panel.classList.remove('visible');
            focusedPlanetObj = null;
            planets.forEach(p => p.navEl && p.navEl.classList.remove('active'));
            tPan.set(0, 0, 0);
            tSph.r = 330;
        }
        document.getElementById('pp-close').addEventListener('click', closePanel);

        function focusPlanet(p, navEl) {
            focusedPlanetObj = p;
            showPanel(p.data, p.data.moonDefs);
            playPing(p.data.tone);
            const wp = new THREE.Vector3();
            p.mesh.getWorldPosition(wp);
            tPan.copy(wp);
            tSph.r = p.data.r * 12 + 55;
            planets.forEach(q => q.navEl && q.navEl.classList.remove('active'));
            if (navEl) navEl.classList.add('active');
        }

        c3d.addEventListener('click', e => {
            m2d.x = (e.clientX / innerWidth) * 2 - 1;
            m2d.y = -(e.clientY / innerHeight) * 2 + 1;
            ray.setFromCamera(m2d, camera);
            const hits = ray.intersectObjects(planets.map(p => p.mesh), false);
            spawnRing(e.clientX, e.clientY);
            if (hits.length) {
                const p = m2p.get(hits[0].object);
                if (p) focusPlanet(p, p.navEl)
            } else closePanel();
        });

        c3d.addEventListener('mousemove', e => {
            m2d.x = (e.clientX / innerWidth) * 2 - 1;
            m2d.y = -(e.clientY / innerHeight) * 2 + 1;
            ray.setFromCamera(m2d, camera);
            const hit = ray.intersectObjects(planets.map(p => p.mesh), false).length > 0;
            curEl.classList.toggle('hover', hit);
            curDot.classList.toggle('hover', hit);
            if (hit) {
                const h = ray.intersectObjects(planets.map(p => p.mesh), false)[0];
                const p = m2p.get(h.object);
                if (p) showTT(p.data.name, e.clientX, e.clientY)
            } else hideTT();
        });

        // ── Speed ────────────────────────────────────────────────
        let speedMult = 0.3;
        document.getElementById('speed-slider').addEventListener('input', e => {
            speedMult = parseFloat(e.target.value);
            document.getElementById('speed-val').textContent = speedMult.toFixed(1) + '×';
        });

        // ── Sim date ─────────────────────────────────────────────
        let simYear = 2025,
            simDays = 0;

        function updateDate(dt) {
            simDays += dt * speedMult * 60;
            while (simDays >= 365) {
                simDays -= 365;
                simYear++
            }
            document.getElementById('sim-date').textContent = simYear;
        }

        // ── Loading ──────────────────────────────────────────────
        let lpct = 0;
        const lbar = document.getElementById('load-bar'),
            lpctEl = document.getElementById('load-pct'),
            lscreen = document.getElementById('loading');
        const li2 = setInterval(() => {
            lpct = Math.min(100, lpct + Math.random() * 9 + 3);
            lbar.style.width = lpct + '%';
            lpctEl.textContent = Math.floor(lpct) + '%';
            if (lpct >= 100) {
                clearInterval(li2);
                setTimeout(() => lscreen.classList.add('fade'), 400)
            }
        }, 55);

        // ── Main loop ────────────────────────────────────────────
        const clock = new THREE.Clock();
        let lastT = 0;

        function animate() {
            requestAnimationFrame(animate);
            const t = clock.getElapsedTime(),
                dt = t - lastT;
            lastT = t;

            // Star twinkle
            if (window._starMat) window._starMat.uniforms.time.value = t;

            // Sun
            sunMesh.rotation.y += .0007;
            sunLight.intensity = 4.0 + .5 * Math.sin(t * .65);
            sunGlow1.material.opacity = .88 + .12 * Math.sin(t * .8);
            sunGlow2.material.opacity = .36 + .14 * Math.sin(t * .5 + 1.1);

            // Planets
            planets.forEach(p => {
                p.angle += p.spd * speedMult;
                p.pivot.rotation.y = p.angle;
                p.mesh.rotation.y += .0018 * speedMult;
                // Aurora time update
                if (p.mesh.userData.aurMat) p.mesh.userData.aurMat.uniforms.time.value = t;
                // Moons
                p.moons.forEach(m => {
                    m.angle += m.speed * speedMult;
                    m.moonPivot.rotation.y = m.angle;
                });
                // Follow focused planet
                if (focusedPlanetObj === p) {
                    const wp = new THREE.Vector3();
                    p.mesh.getWorldPosition(wp);
                    tPan.copy(wp)
                }
            });

            // Comets
            comets.forEach(c => {
                c.angle += c.speed * speedMult;
                c.pivot.rotation.y = c.angle;
                // Fade tail by distance from sun (closer = brighter)
                const dist = c.orbitR;
                c.tail.material.opacity = Math.max(0, .7 - dist / 550);
                if (c.glow) c.glow.material.opacity = Math.max(0, .9 - dist / 400);
            });

            updateDate(dt);
            camUpdate();
            renderer.render(scene, camera);
            drawBloom();
            updateWind(t);
        }
        animate();
    </script>
</body>

</html>
